name: "CI - Shared Libraries"

on:
  push:
    branches: [ main, develop, master ]
    paths:
      - 'fpm-libs/**'
  pull_request:
    branches: [ main, develop, master ]
    paths:
      - 'fpm-libs/**'
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Quan trọng: Phải có quyền ghi package
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          # Tự động cấu hình settings.xml cho GitHub Packages
          server-id: github
          cache: 'maven'

      - name: Publish to GitHub Packages
        run: |
          cd fpm-libs
          mvn clean deploy -DskipTests -B
        env:
          # Maven dùng biến này để map với server-id 'github'
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Build success summary
        if: success()
        run: |
          echo "## 🚀 Shared Libraries Published Successfully" >> $GITHUB_STEP_SUMMARY
          echo "Thư viện đã được đẩy lên GitHub Packages." >> $GITHUB_STEP_SUMMARY
